services:
  backend:
    build:
      context: ./backend
    container_name: uniguard-backend
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: uniguard-frontend
    depends_on:
      - backend
    ports:
      - "3000:80"
    restart: unless-stopped